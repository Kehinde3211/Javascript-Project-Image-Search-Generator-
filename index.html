<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-blue-900">
    <form id="form-submit" class="grid justify-self-center">
        <p class="mt-30 md:text-3xl text-white font-bold md:ml-20 text-2xl ml-10">Image Search Engine</p>
        <div class="mt-10 flex relative">
            <label for="text">
            <input type="text" id="search" placeholder="Search anything here....." class="bg-blue-800 h-14 md:pl-10 text-white md:pr-30 font-medium rounded-l-md focus:outline-none pl-2">
          </label>
            <button type="submit" id="submit" class="h-14 bg-red-600 w-30 text-white font-medium rounded-r-md">Search</button>
        </div>
    </form>
    <div id="search-result"></div>
    <button type="button" id="show-more-button" class="bg-red-600 mt-5 h-10 font-medium text-white w-30 rounded-md ml-45 hidden">Show more</button>
    <script src="script.js" defer></script>
</body>

</html>
